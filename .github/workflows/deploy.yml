name: Deploy

# Public repo + self-hosted runner: only trigger on push to main and manual
# dispatch. Never on pull_request — that would let forks run code on the runner.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15

    env:
      DEPLOY_TARGET: /opt/immich-backup-s3
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      LAMBDA_NAME: ImmichBackupMonitor
      SCHEDULE_NAME: ImmichBackupDailyMonitor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync repo to deploy target
        run: |
          set -euo pipefail
          # The runner user owns $DEPLOY_TARGET (set up by
          # server-setup/04_install_github_runner.sh).
          # --exclude paths are preserved on the destination across deploys
          # — that's how /opt/immich-backup-s3/.env survives.
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='*.log' \
            --exclude='*.snar' \
            --exclude='*.snar.bak' \
            --exclude='.backup_tmp/' \
            --exclude='.backup_state/' \
            ./ "$DEPLOY_TARGET/"
          find "$DEPLOY_TARGET"/scripts \
               "$DEPLOY_TARGET"/aws-setup \
               "$DEPLOY_TARGET"/server-setup \
               -name '*.sh' -exec chmod +x {} +

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Apply S3 lifecycle policy
        run: |
          aws s3api put-bucket-lifecycle-configuration \
            --bucket "$S3_BUCKET" \
            --lifecycle-configuration "file://$DEPLOY_TARGET/aws-setup/02_lifecycle_policy.json"

      - name: Deploy Lambda code & config
        run: |
          set -euo pipefail
          WORK=$(mktemp -d)
          cp "$DEPLOY_TARGET/aws-setup/05_lambda_function.py" "$WORK/lambda_function.py"
          (cd "$WORK" && zip -q function.zip lambda_function.py)

          aws lambda update-function-code \
            --function-name "$LAMBDA_NAME" \
            --zip-file "fileb://$WORK/function.zip" \
            --region "$AWS_REGION" >/dev/null

          aws lambda wait function-updated \
            --function-name "$LAMBDA_NAME" \
            --region "$AWS_REGION"

          aws lambda update-function-configuration \
            --function-name "$LAMBDA_NAME" \
            --environment "Variables={SLACK_WEBHOOK_URL=$SLACK_WEBHOOK_URL,BUCKET=$S3_BUCKET}" \
            --region "$AWS_REGION" >/dev/null

          rm -rf "$WORK"

      - name: Update EventBridge schedule
        run: |
          set -euo pipefail
          LAMBDA_ARN=$(aws lambda get-function \
            --function-name "$LAMBDA_NAME" \
            --region "$AWS_REGION" \
            --query 'Configuration.FunctionArn' --output text)
          SCHEDULER_ROLE_ARN=$(aws iam get-role \
            --role-name ImmichBackupSchedulerRole \
            --query 'Role.Arn' --output text)
          aws scheduler update-schedule \
            --name "$SCHEDULE_NAME" \
            --schedule-expression "cron(0 4 * * ? *)" \
            --schedule-expression-timezone "UTC" \
            --flexible-time-window "Mode=OFF" \
            --target "{\"Arn\":\"$LAMBDA_ARN\",\"RoleArn\":\"$SCHEDULER_ROLE_ARN\"}" \
            --region "$AWS_REGION" >/dev/null

      - name: Summary
        run: |
          echo "✓ Deployed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "  Repo synced to: $DEPLOY_TARGET"
          echo "  Lambda updated: $LAMBDA_NAME"
          echo "  Lifecycle re-applied on bucket: $S3_BUCKET"
